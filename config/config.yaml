project:
  name: "Startup Growth Analytics System"
  version: "1.0.0"
  seed: 42

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_features: "data/features"
  outputs: "data/outputs"
  models: "models"
  logs: "logs"
  reports: "reports"
  database: "data/startup_growth.db"

world_bank:
  base_url: "https://api.worldbank.org/v2"
  start_year: 2015
  end_year: 2023
  countries:
    - "US"  # United States
    - "IN"  # India
    - "GB"  # United Kingdom
    - "DE"  # Germany
    - "FR"  # France
    - "SG"  # Singapore
    - "IL"  # Israel
    - "CA"  # Canada
    - "AU"  # Australia
    - "BR"  # Brazil
    - "CN"  # China
    - "KR"  # South Korea
    - "NL"  # Netherlands
    - "SE"  # Sweden
    - "ID"  # Indonesia
  indicators:
    NY.GDP.MKTP.CD: "gdp_usd"
    NY.GDP.PCAP.CD: "gdp_per_capita"
    NY.GDP.MKTP.KD.ZG: "gdp_growth_rate"
    IT.NET.USER.ZS: "internet_penetration"
    SL.UEM.TOTL.ZS: "unemployment_rate"
    SP.POP.TOTL: "population"
    GB.XPD.RSDV.GD.ZS: "rd_expenditure_pct_gdp"
    IC.BUS.EASE.XQ: "ease_of_doing_business"

ml:
  test_size: 0.2
  val_size: 0.1
  cv_folds: 5
  n_jobs: -1

pandemic:
  start_year: 2020
  end_year: 2021
  pre_pandemic_years: [2015, 2016, 2017, 2018, 2019]
  post_pandemic_years: [2022, 2023]
